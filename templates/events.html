{% extends 'base.html' %}
{% block title %}Events{% endblock %}

{% block content %}
<div class="d-flex justify-content-between mb-4">
    <h2>Events</h2>
    <a href="/events/add" class="btn btn-success">+ Add Event</a>
</div>

<div class="card">
    <div class="card-body">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Date</th>
                    <th>Location</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody>
                {% for e in events %}
                <tr>
                    <td>{{ e['id'] }}</td>
                    <td>{{ e['title'] }}</td>
                    <td>{{ e['event_date'] }}</td>
                    <td>{{ e['location'] }}</td>
                    <td>{{ e['description'] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
