{% extends 'base.html' %}
{% block title %}Add Contribution{% endblock %}

{% block content %}
<div class="d-flex justify-content-between mb-4">
    <h2>Add Contribution</h2>
    <a href="/contributions" class="btn btn-secondary">← Back</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Parishioner</label>
                <select name="parishioner_id" class="form-select" required>
                    <option value="">-- Select Parishioner --</option>
                    {% for p in parishioners %}
                    <option value="{{ p['id'] }}">{{ p['full_name'] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Amount (KSh)</label>
                <input type="number" name="amount" class="form-control" placeholder="e.g. 500" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Category</label>
                <select name="category" class="form-select" required>
                    <option value="">-- Select Category --</option>
                    <option>Tithe</option>
                    <option>Offering</option>
                    <option>Harambee</option>
                    <option>Building Fund</option>
                    <option>Thanksgiving</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="date" name="contribution_date" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Notes</label>
                <textarea name="notes" class="form-control" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Save Contribution</button>
        </form>
    </div>
</div>
{% endblock %}
