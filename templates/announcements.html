{% extends 'base.html' %}
{% block title %}Announcements{% endblock %}

{% block content %}
<div class="d-flex justify-content-between mb-4">
    <h2>Announcements</h2>
    <a href="/announcements/add" class="btn btn-primary">+ Add Announcement</a>
</div>

<div class="row">
    {% for a in announcements %}
    <div class="col-md-6 mb-3">
        <div class="card border-primary">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <span>{{ a['title'] }}</span>
                <div>
                    <a href="/announcements/edit/{{ a['id'] }}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="/announcements/delete/{{ a['id'] }}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this announcement?')">Delete</a>
                </div>
            </div>
            <div class="card-body">
                <p class="card-text">{{ a['message'] }}</p>
                <small class="text-muted">Date: {{ a['created_at'] }} | Audience: {{ a['audience'] }}</small>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
