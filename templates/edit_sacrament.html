{% extends 'base.html' %}
{% block title %}Edit Sacrament{% endblock %}

{% block content %}
<div class="d-flex justify-content-between mb-4">
    <h2>Edit Sacramental Record</h2>
    <a href="/sacraments" class="btn btn-secondary">← Back</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Parishioner</label>
                <select name="parishioner_id" class="form-select" required>
                    <option value="">-- Select Parishioner --</option>
                    {% for p in parishioners %}
                    <option value="{{ p['id'] }}" {% if p['id'] == s['parishioner_id'] %}selected{% endif %}>{{ p['full_name'] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Sacrament Type</label>
                <select name="sacrament_type" class="form-select" required>
                    <option {% if s['sacrament_type'] == 'Baptism' %}selected{% endif %}>Baptism</option>
                    <option {% if s['sacrament_type'] == 'Confirmation' %}selected{% endif %}>Confirmation</option>
                    <option {% if s['sacrament_type'] == 'Holy Communion' %}selected{% endif %}>Holy Communion</option>
                    <option {% if s['sacrament_type'] == 'Marriage' %}selected{% endif %}>Marriage</option>
                    <option {% if s['sacrament_type'] == 'Holy Orders' %}selected{% endif %}>Holy Orders</option>
                    <option {% if s['sacrament_type'] == 'Anointing of the Sick' %}selected{% endif %}>Anointing of the Sick</option>
                    <option {% if s['sacrament_type'] == 'Confession' %}selected{% endif %}>Confession</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Date Received</label>
                <input type="date" name="date_received" class="form-control" value="{{ s['date_received'] }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Officiant</label>
                <input type="text" name="officiant" class="form-control" value="{{ s['officiant'] }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Notes</label>
                <textarea name="notes" class="form-control" rows="3">{{ s['notes'] }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}
