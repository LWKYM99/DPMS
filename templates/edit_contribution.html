{% extends 'base.html' %}
{% block title %}Edit Contribution{% endblock %}

{% block content %}
<div class="d-flex justify-content-between mb-4">
    <h2>Edit Contribution</h2>
    <a href="/contributions" class="btn btn-secondary">← Back</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Parishioner</label>
                <select name="parishioner_id" class="form-select" required>
                    <option value="">-- Select Parishioner --</option>
                    {% for p in parishioners %}
                    <option value="{{ p['id'] }}" {% if p['id'] == c['parishioner_id'] %}selected{% endif %}>{{ p['full_name'] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Amount (KSh)</label>
                <input type="number" name="amount" class="form-control" value="{{ c['amount'] }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Category</label>
                <select name="category" class="form-select" required>
                    <option {% if c['category'] == 'Tithe' %}selected{% endif %}>Tithe</option>
                    <option {% if c['category'] == 'Offering' %}selected{% endif %}>Offering</option>
                    <option {% if c['category'] == 'Harambee' %}selected{% endif %}>Harambee</option>
                    <option {% if c['category'] == 'Building Fund' %}selected{% endif %}>Building Fund</option>
                    <option {% if c['category'] == 'Thanksgiving' %}selected{% endif %}>Thanksgiving</option>
                    <option {% if c['category'] == 'Other' %}selected{% endif %}>Other</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="date" name="contribution_date" class="form-control" value="{{ c['contribution_date'] }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Notes</label>
                <textarea name="notes" class="form-control" rows="3">{{ c['notes'] }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}
