{% extends 'base.html' %}
{% block title %}Add Sacrament{% endblock %}

{% block content %}
<div class="d-flex justify-content-between mb-4">
    <h2>Add Sacramental Record</h2>
    <a href="/sacraments" class="btn btn-secondary">← Back</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Parishioner</label>
                <select name="parishioner_id" class="form-select" required>
                    <option value="">-- Select Parishioner --</option>
                    {% for p in parishioners %}
                    <option value="{{ p['id'] }}">{{ p['full_name'] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Sacrament Type</label>
                <select name="sacrament_type" class="form-select" required>
                    <option value="">-- Select Sacrament --</option>
                    <option>Baptism</option>
                    <option>Confirmation</option>
                    <option>Holy Communion</option>
                    <option>Marriage</option>
                    <option>Holy Orders</option>
                    <option>Anointing of the Sick</option>
                    <option>Confession</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Date Received</label>
                <input type="date" name="date_received" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Officiant</label>
                <input type="text" name="officiant" class="form-control" placeholder="e.g. Fr. John">
            </div>
            <div class="mb-3">
                <label class="form-label">Notes</label>
                <textarea name="notes" class="form-control" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Save Record</button>
        </form>
    </div>
</div>
{% endblock %}
